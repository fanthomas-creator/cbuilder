<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>C Builder — Visual Code Assembler</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="engine/engine.css"/>
<style>
/* ── Language selector ─────────────────────────────────────── */
#lang-selector{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:6px;padding:3px 8px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary);
  transition:all .15s;position:relative
}
#lang-selector:hover{border-color:var(--border-h);color:var(--text-primary)}
#lang-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#lang-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;min-width:160px;
  background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:999;display:none;overflow:hidden
}
#lang-dropdown.open{display:block}
.lang-option{
  display:flex;align-items:center;gap:8px;padding:7px 12px;
  cursor:pointer;transition:background .12s;font-size:11px;
  font-family:'JetBrains Mono',monospace;color:var(--text-secondary)
}
.lang-option:hover{background:rgba(255,255,255,.06);color:var(--text-primary)}
.lang-option.active{color:var(--accent);background:rgba(74,158,255,.08)}
.lang-opt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<div id="app">
<header id="header">
  <div class="logo">C<em>Builder</em>
    <span style="font-size:9px;color:var(--text-dim);margin-left:4px;font-family:'Syne',sans-serif;font-weight:400">Scratch Mode</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px;margin-left:14px">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--c-funcs);box-shadow:0 0 6px var(--c-funcs)"></div>
    <span style="font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace">Multi-Language</span>
  </div>
  <div style="margin-left:12px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace">
    Clic droit = pan · Molette = zoom · ↑ éjecter · Suppr effacer
  </div>

  <!-- Language selector -->
  <div id="lang-selector" title="Changer de plugin de langage">
    <div id="lang-dot"></div>
    <span id="lang-name">C</span>
    <span style="font-size:9px;opacity:.5">▾</span>
    <div id="lang-dropdown">
      <!-- Populated by JS -->
    </div>
  </div>

  <div id="header-actions">
    <button class="btn" id="btn-save-json" title="Sauvegarder projet (.json)">💾 sauver</button>
    <button class="btn" id="btn-load-json" title="Ouvrir projet (.json)">📂 ouvrir</button>
    <input type="file" id="input-load-json" accept=".json" style="display:none"/>
    <button class="btn" id="btn-example">⊕ exemple</button>
    <button class="btn danger" id="btn-clear">✕ vider</button>
    <button class="btn primary" id="btn-copy">⧉ copier</button>
  </div>
</header>

<div id="workspace">
  <div id="filetree">
    <div id="filetree-header">
      <span id="filetree-title">Projet</span>
      <button class="ft-btn" id="ft-new-c" title="Nouveau .c">+C</button>
      <button class="ft-btn" id="ft-new-h" title="Nouveau .h">+H</button>
      <button class="ft-btn" id="ft-new-mk" title="Makefile">+M</button>
    </div>
    <div id="filetree-list"></div>
  </div>
  <div class="ft-resizer" id="resizer-ft"></div>
  <aside id="sidebar">
    <div id="sidebar-search">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Rechercher..." spellcheck="false" autocomplete="off"/>
      </div>
    </div>
    <div id="sidebar-content"></div>
  </aside>
  <div class="resizer" id="resizer-left"></div>
  <div id="canvas-wrap">
    <div id="tabs-bar"></div>
    <div id="canvas">
      <div id="world"></div>
      <div id="snap-guide"></div>
      <div id="canvas-empty">
        <div class="empty-icon">{ }</div>
        <div class="empty-text">Glissez des blocs sur le canvas<br>ou double-cliquez pour les ajouter</div>
        <div class="empty-hint">⊞ conteneur · ↑ éjecter · Suppr effacer · Clic droit = pan</div>
      </div>
      <div id="zoom-controls">
        <button class="zoom-btn" id="btn-zoom-out">−</button>
        <span id="zoom-label">100%</span>
        <button class="zoom-btn" id="btn-zoom-in">+</button>
        <button class="zoom-btn" id="btn-zoom-reset" title="Reset zoom">⊙</button>
      </div>
      <div id="pan-hint">Clic droit + drag pour naviguer</div>
    </div>
  </div>
  <div class="resizer" id="resizer-right"></div>
  <aside id="code-panel">
    <div id="code-panel-header">
      <span class="cp-title"><span class="cp-filename" id="code-filename">main.c</span></span>
      <span class="cp-badge">généré</span>
    </div>
    <div id="code-output"><pre id="code-content"></pre></div>
    <div id="code-panel-footer">
      <button class="btn" id="btn-copy-footer" style="flex:1;justify-content:center">⧉ Copier</button>
      <button class="btn" id="btn-download" style="flex:1;justify-content:center">↓ Télécharger</button>
    </div>
  </aside>
</div>
</div>

<div id="drag-ghost"></div>
<div id="toast-container"></div>

<!-- ── Load order ─────────────────────────────────────────────
     1. Plugin API (must be first)
     2. Language plugins (register themselves)
     3. Engine core
     4. Engine extensions (file tree, sidebar override, save/load)
     5. Boot
     ────────────────────────────────────────────────────────── -->
<script src="engine/plugin-api.js"></script>
<script src="plugins/c/c-plugin.js"></script>
<script src="plugins/python/python-plugin.js"></script>
<script src="plugins/rust/rust-plugin.js"></script>
<script src="plugins/bash/bash-plugin.js"></script>
<script src="engine/engine.js"></script>
<script src="engine/extensions.js"></script>
<script>
// ── Language selector UI ──────────────────────────────────────
function buildLangSelector() {
  var dd = document.getElementById('lang-dropdown');
  var nameEl = document.getElementById('lang-name');
  var dotEl  = document.getElementById('lang-dot');
  dd.innerHTML = '';
  getAllPlugins().forEach(function(plugin) {
    var opt = document.createElement('div');
    opt.className = 'lang-option';
    opt.innerHTML = '<div class="lang-opt-dot" style="background:'+plugin.color+'"></div>'
      + '<span>' + plugin.name + '</span>'
      + '<span style="margin-left:auto;font-size:9px;color:var(--text-dim)">'
      + Object.keys(plugin.fileTypes).map(function(e){return '.'+e;}).join(' ')
      + '</span>';
    opt.addEventListener('click', function() {
      // Update active file's extension to match new plugin's first extension
      var tab = getTab();
      if (tab) {
        var firstExt = Object.keys(plugin.fileTypes)[0];
        var baseName = tab.name.replace(/\.[^.]+$/, '');
        var newName  = baseName + '.' + firstExt;
        tab.name = newName;
        var file = FS.files.find(function(f){return f.id===tab.id;});
        if (file) { file.name = newName; file.type = firstExt; }
        nameEl.textContent  = plugin.name;
        dotEl.style.background = plugin.color;
        renderTabs(); renderSidebar(); renderCode(); renderFileTree();
      }
      dd.classList.remove('open');
    });
    dd.appendChild(opt);
  });

  document.getElementById('lang-selector').addEventListener('click', function(e) {
    if (!e.target.closest('.lang-option')) dd.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#lang-selector')) dd.classList.remove('open');
  });

  // Set initial display
  var first = getAllPlugins()[0];
  if (first) { nameEl.textContent = first.name; dotEl.style.background = first.color; }
}
</script>
<script src="engine/boot.js"></script>
<script>
// Run lang selector after boot
buildLangSelector();
</script>
</body>
</html>
